<!DOCTYPE html>
<html>

<head>
    <title>Portfolio | Leo Tang</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="bootstrap/main.css" rel="stylesheet" />
    <link href="animate.css/animate.css" rel="stylesheet" />
    <link href="css/shared.css" rel="stylesheet" />
    <link href="css/projects.css" rel="stylesheet" />

    <script src="js/anims.js" defer></script>
    <script src="js/adjust.js" defer></script>
    <script src="js/cursor.js" defer></script>
    <script src="js/reload.js" defer></script>
    <script src="js/projects.js" defer></script>

    <link href="https://fonts.googleapis.com/css?family=Poppins:400,600&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="pictures/CursorClickSmall.png">
    <link rel="preload" as="image" href="pictures/CursorSmall.png">
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="bg-camera">
        <video autoplay muted loop playsinline poster="pictures/BackgroundBackup.jpg">
            <source src="documents/BackgroundVideo.mp4" type="video/mp4">
        </video>
    </div>
    <img id="cursor" src="pictures/CursorNormal.png">

    <div id="app">
        <div class="bg-red-overlay"></div>
        <div class="top-hud">
            <a href="index.html" class="back-button clickable">
                <svg class="back-cyber-button" viewBox="0 0 100 60">
                    <path class="btn-shape-back" d="M0 0 H100 V44 L84 60 H0 Z" />
                    <text x="18" y="38">BACK</text>
                </svg>
            </a>
            <div class="hud-title">LEO TANG</div>
            <div class="hud-bar"></div>
        </div>

        <div class="page-content">

            <div class="left-panel">

                <div class="project-item-wrapper clickable" data-project="portfolio">
                    <svg class="list-item" viewBox="0 0 260 60">
                        <path d="M0 0 H260 V44 L244 60 H0 Z" />
                        <text x="18" y="36" class="project-title">Portfolio Website</text>
                        <text x="18" y="60" class="project-subtext">You're on it right now</text>
                    </svg>
                </div>
                <div class="project-item-wrapper clickable" data-project="circuitforge">
                    <svg class="list-item" viewBox="0 0 260 60">
                        <path d="M0 0 H260 V44 L244 60 H0 Z" />
                        <text x="18" y="36" class="project-title">CircuitForge</text>
                        <text x="18" y="60" class="project-subtext">Web app that helps hobbyists design PCBs</text>
                    </svg>
                </div>
                <div class="project-item-wrapper clickable" data-project="nexus">
                    <svg class="list-item" viewBox="0 0 260 60">
                        <path d="M0 0 H260 V44 L244 60 H0 Z" />
                        <text x="18" y="36" class="project-title">NEXUS</text>
                        <text x="18" y="60" class="project-subtext">Assistive device that helps people with
                            deafblindness follow
                            conversations</text>
                    </svg>
                </div>
                <div class="project-item-wrapper clickable" data-project="radius">
                    <svg class="list-item" viewBox="0 0 260 60">
                        <path d="M0 0 H260 V44 L244 60 H0 Z" />
                        <text x="18" y="36" class="project-title">Radius</text>
                        <text x="18" y="60" class="project-subtext">Mobile app that connects users with local
                            businesses</text>
                    </svg>
                </div>
                <div class="project-item-wrapper clickable" data-project="deltadispatch">
                    <svg class="list-item" viewBox="0 0 260 60">
                        <path d="M0 0 H260 V44 L244 60 H0 Z" />
                        <text x="18" y="36" class="project-title">DeltaDispatch</text>
                        <text x="18" y="60" class="project-subtext">Web app that helps dispatchers identify the most
                            critical calls</text>
                    </svg>
                </div>
                <div class="project-item-wrapper clickable" data-project="trashtag">
                    <svg class="list-item" viewBox="0 0 260 60">
                        <path d="M0 0 H260 V44 L244 60 H0 Z" />
                        <text x="18" y="36" class="project-title">TrashTag</text>
                        <text x="18" y="60" class="project-subtext">Android app that gamifies environmental
                            cleanup</text>
                    </svg>
                </div>
                <div class="project-item-wrapper clickable" data-project="leaf">
                    <svg class="list-item" viewBox="0 0 260 60">
                        <path d="M0 0 H260 V44 L244 60 H0 Z" />
                        <text x="18" y="36" class="project-title">Leaf</text>
                        <text x="18" y="60" class="project-subtext">Android todo list with time- and location-based
                            reminders</text>
                    </svg>
                </div>
                <div class="project-item-wrapper clickable" data-project="studylocal">
                    <svg class="list-item" viewBox="0 0 260 60">
                        <path d="M0 0 H260 V44 L244 60 H0 Z" />
                        <text x="18" y="36" class="project-title">StudyLocal</text>
                        <text x="18" y="60" class="project-subtext">Web app that helps students find and compare the
                            best study spots</text>
                    </svg>
                </div>


            </div>
            <div class="right-panel">

                <div class="right-title-row">
                    <div class="right-title-block">
                        <!-- TODO do not remove maybe make title a little whiter than the bottom -->
                        <div class="right-title-header">
                            <div class="right-title">PROJECT TITLE</div>
                            <div class="right-line"></div>
                        </div>
                        <div class="right-meta-row">
                            <div class="meta-box clickable icon-swap" data-icon="github">
                                <svg viewBox="0 0 60 60" class="meta-svg">
                                    <path class="meta-shape" d="M1 1 H59 V43 L43 59 H1 Z" />
                                    <a href="">
                                        <image href="pictures/githubinactive.svg" x="12" y="12" width="60%" height="60%"
                                            preserveAspectRatio="xMidYMid meet" class="meta-icon" />
                                    </a>
                                </svg>
                            </div>

                            <div class="meta-box clickable icon-swap" data-icon="devpost">
                                <svg viewBox="0 0 60 60" class="meta-svg">
                                    <path class="meta-shape" d="M1 1 H59 V43 L43 59 H1 Z" />
                                    <a href="">
                                        <image href="pictures/devpostinactive.svg" x="12" y="12" width="60%"
                                            height="60%" preserveAspectRatio="xMidYMid meet" class="meta-icon" />
                                    </a>
                                </svg>
                            </div>

                            <div class="meta-box clickable icon-swap" data-icon="ysc">
                                <svg viewBox="0 0 60 60" class="meta-svg">
                                    <path class="meta-shape" d="M1 1 H59 V43 L43 59 H1 Z" />
                                    <a href="">
                                        <image href="pictures/yscinactive.png" x="12" y="12" width="60%" height="60%"
                                            preserveAspectRatio="xMidYMid meet" class="meta-icon" />
                                    </a>
                                </svg>
                            </div>

                        </div>
                    </div>

                    <div class="right-title-image">
                        <svg class="right-image" viewBox="0 0 260 100">
                            <defs>
                                <clipPath id="cut-corner">
                                    <path id="clip-path-shape" d="M0 0 H260 V44 L244 100 H0 Z" />
                                </clipPath>
                            </defs>
                            <path id="main-path" d="M0 0 H260 V44 L244 56 H0 Z" />
                            <image href="pictures/PortfolioWebsitePreview.jpeg" width="260" height="60"
                                clip-path="url(#cut-corner)" preserveAspectRatio="xMidYMid slice" x="0" y="0" />
                        </svg>
                    </div>
                </div>


                <div class="right-text">
                    placeholder text goes here<br>
                    more placeholder content<br>
                    more red cyber text
                </div>

            </div>

        </div>
    </div>

    <div id="orientationOverlay">
        <p>Rotate your device to landscape mode</p>
    </div>


</body>

</html>
